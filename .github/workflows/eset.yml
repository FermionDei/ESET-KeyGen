name: Generate ESET Keys

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run generator script
        run: |
          echo "Создание результатов..."
          echo "Test Results" > results.md
          echo "Account1: user1" > ACCOUNTS.txt
          echo "Key1: XXXX-XXXX-XXXX-XXXX" > KEYS.txt

      - name: Show directory contents
        run: |
          echo "Файлы в текущей директории:"
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eset-artifacts-${{ matrix.os }}
          path: |
            results.md
            ACCOUNTS.txt
            KEYS.txt
